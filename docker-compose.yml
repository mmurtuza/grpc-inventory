services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB:       inventory
      POSTGRES_USER:     inventory
      POSTGRES_PASSWORD: secret
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── REST API ───────────────────────────────────────────────────────────────
  rest-api:
    build:
      context: .
      target: rest-api
    ports:
      - "${REST_API_PORT:-8080}:8080"
    environment:
      - DATABASE_URL=postgres://inventory:secret@postgres:5432/inventory?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - LOG_FORMAT=json
      - REST_API_PORT=8080
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # ── gRPC Server ────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      target: server
    ports:
      - "${GRPC_PORT:-50051}:50051"
    environment:
      - REST_API_URL=http://rest-api:8080
      - GRPC_PORT=50051
      - LOG_FORMAT=json
    depends_on:
      rest-api:
        condition: service_healthy
    restart: on-failure
    networks:
      - inventory-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # ── gRPC Client (demo) ─────────────────────────────────────────────────────
  client:
    build:
      context: .
      target: client
    environment:
      - SERVER_ADDR=server:50051
    depends_on:
      - server
    restart: "no"
    networks:
      - inventory-net

networks:
  inventory-net:
    driver: bridge

volumes:
  pgdata:
